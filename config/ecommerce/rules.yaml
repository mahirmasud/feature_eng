advanced_entity_handling:
  treat_customer_and_session_as_user_identity_sources: true
  treat_transaction_and_order_line_as_purchase_interactions: true
  treat_session_behavior_as_view_search_cart_intent: true
  treat_inventory_as_recommendation_availability_guardrail: true
  treat_address_location_store_channel_as_serving_context: true
  treat_return_review_support_dispute_as_negative_feedback_or_quality_signals: true
  treat_bundle_component_as_complementary_recommendation_graph: true
  respect_consent_before_outbound_recommendation_delivery: true
  do_not_use_tax_payout_purchase_order_as_direct_user_recommendation_targets: true
business_context_resolution:
  inputs:
  - merchant-selected business type
  - detected entities
  - column patterns
  - source system
  - enabled metrics
  - enabled workflows
  outputs:
  - business_type
  - product_type
  - sales_channel_model
  - marketplace_model
  - subscription_model
  - fulfillment_model
  - inventory_model
  - payment_model
  - tax_region_model
  - marketing_model
  - support_model
  - recommendation_surfaces
  - identity_model
  - item_grain
  - recommendation_goals
  default_policy: If context is unknown, use safe cold-start and session-context recommendations; ask only when identity,
    item grain, availability, or compliance ambiguity could cause bad recommendations.
requirement_resolution_rules:
- id: RR_001
  name: universal_identifier_first
  logic: For each recognized entity, require only schema.requirement_policy.universal_required_fields as the base mapping
    contract. If the source lacks a direct key, generate a stable surrogate/composite key from deterministic fields.
- id: RR_002
  name: conditional_fields_by_business_context
  logic: Activate conditional_required_fields only when business_type, product_type, channel, workflow, metric, or compliance
    context matches the field required_when statements.
- id: RR_003
  name: recommended_fields_are_quality_boosters
  logic: Missing recommended fields should lower quality/completeness score but must not block mapping, ingestion, or entity
    recognition.
- id: RR_004
  name: optional_fields_are_enrichment_only
  logic: Optional fields may improve personalization, segmentation, or advanced analytics but are never required for a generic
    ecommerce source.
- id: RR_005
  name: metric_driven_requirement_activation
  logic: When a metric is enabled, activate only the fields listed in metrics.yaml uses_fields for that metric and the join
    keys needed to compute it. Other fields remain recommended/optional.
- id: RR_006
  name: workflow_driven_requirement_activation
  logic: When a workflow is enabled, such as fulfillment, tax, returns, payout, disputes, or consent, activate the fields
    needed for that workflow only for related business models.
