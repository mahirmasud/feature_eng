dictionary_name: E-commerce Field Recognition Keywords
version: 2.2.0-business-conditional-requirements
purpose: Layer 3 field recognition dictionary for mapping source columns to a universal e-commerce schema.
layer: 'Layer 3: Field Recognition'
normalization_rules:
- lowercase
- trim whitespace
- replace hyphen/space/dot/slash with underscore
- split camelCase and PascalCase
- remove duplicate underscores
- expand common abbreviations such as id, qty, amt, no, ref, txn, cust
- compare exact, normalized, token-set, and fuzzy scores inside the predicted entity context
metadata:
  standard_fields_covered: 162
  total_synonyms: 2481
  average_synonyms_per_field: 15.31
  synonym_count_distribution:
    fields_with_2_synonyms: 2
    fields_with_7_synonyms: 7
    fields_with_8_synonyms: 2
    fields_with_9_synonyms: 1
    fields_with_10_synonyms: 3
    fields_with_11_synonyms: 3
    fields_with_12_synonyms: 21
    fields_with_13_synonyms: 10
    fields_with_14_synonyms: 9
    fields_with_15_synonyms: 10
    fields_with_16_synonyms: 12
    fields_with_17_synonyms: 14
    fields_with_18_synonyms: 45
    fields_with_19_synonyms: 21
    fields_with_21_synonyms: 1
    fields_with_22_synonyms: 1
  source_vocabulary_families:
  - Shopify-style API fields
  - Stripe-style billing/payment fields
  - QuickBooks-style accounting fields
  - SAP/ERP-style commerce fields
  - GA4-style ecommerce events
  - custom OMS/WMS/PIM/CRM/CDP naming patterns
  - Shopify Markets/checkout/draft-order/discount naming patterns
  - Stripe payout/dispute/chargeback naming patterns
  - Avalara/TaxJar-style tax vocabulary
  - Zendesk/Gorgias-style support vocabulary
  - Klaviyo/CRM consent and marketing preference fields
  - ERP/WMS stock movement and purchase-order vocabulary
