validation_pack_name: ecommerce_data_quality_rules
version: 2.2.0-business-conditional-requirements
purpose: Data quality checks for canonical ecommerce tables after entity and field mapping. Validations now distinguish universal
  required fields from business-conditional required fields.
severity_levels:
  critical: Breaks joins, revenue reporting, payment reconciliation, or customer identity.
  high: Strongly affects analytics accuracy or recommendation quality.
  medium: Creates partial reporting gaps, dashboard inconsistencies, or weaker segmentation.
  low: Useful cleanup or enrichment issue; does not block core analytics.
global_rules:
- id: GLOBAL_000
  name: business_context_requirement_resolution
  severity: critical
  check: Before blocking a mapping for a missing field, resolve the merchant business context and apply schema.requirement_model.
    Only universal_required fields and active conditional_required fields may block production mapping.
  failure_action: Ask clarifying questions or mark the field not_applicable instead of treating all canonical fields as globally
    required.
- id: GLOBAL_001
  name: primary_key_presence
  severity: critical
  check: Every mapped entity must have at least one stable identifier field.
  failure_action: Block production mapping until identifier is selected or generated.
- id: GLOBAL_002
  name: duplicate_primary_keys
  severity: critical
  check: Primary key uniqueness must be >= 99.99% for dimension/header tables and >= 99.9% for event tables.
  failure_action: Suggest composite key, deduplication rule, or source-system priority.
- id: GLOBAL_003
  name: timestamp_parseability
  severity: high
  check: Timestamp fields must parse to a consistent timezone-aware format.
  failure_action: Normalize timezone and date format before metrics are computed.
- id: GLOBAL_004
  name: currency_consistency
  severity: high
  check: Money fields must have a currency or inherit one from transaction/account/store context.
  failure_action: Ask for base currency and FX conversion policy.
- id: GLOBAL_005
  name: test_data_exclusion
  severity: medium
  check: Rows marked test, sandbox, demo, fake, cancelled, fraud, void, or internal should be separated from production metrics.
  failure_action: Create exclusion filter and show impact on revenue/order counts.
- id: GLOBAL_006
  name: pii_classification
  severity: high
  check: PII fields such as email, phone, name, and address must be tagged before export or model training.
  failure_action: Apply masking/tokenization policy for non-operational use cases.
- id: GLOBAL_007
  name: orphan_foreign_keys
  severity: high
  check: Foreign keys should match parent entities with acceptable orphan rate thresholds.
  failure_action: Report missing parents and recommend source ingestion order.
entity_rules:
- entity: CUSTOMER
  available_fields:
  - customer_id
  - account_id
  - customer_type
  - customer_name
  - email
  - phone
  - billing_address
  - shipping_address
  - country
  - acquisition_channel
  - customer_status
  - created_at
  - lifetime_value
  field_presence_rule:
    severity: critical
    check: For CUSTOMER, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: CUSTOMER_001
    name: email_format
    severity: medium
    check: email should match a valid email-like pattern when present.
  - id: CUSTOMER_002
    name: customer_status_allowed_values
    severity: medium
    check: customer_status should map to lead, active, inactive, blocked, churned, deleted, guest, or unknown.
  - id: CUSTOMER_003
    name: lifetime_value_non_negative
    severity: high
    check: lifetime_value should be >= 0 unless stored as net loss by policy.
  universal_required_fields:
  - customer_id
  conditional_required_fields:
  - field: account_id
    required_when:
    - business_type in [B2B wholesale, marketplace, enterprise retail]
    - account hierarchy, company billing, or parent-child account reporting is needed
  - field: email
    required_when:
    - customer communication, marketing attribution, subscription billing, digital delivery, or identity matching is needed
    - business_type in [DTC retail, SaaS subscription, subscription box, membership, digital goods]
  - field: billing_address
    required_when:
    - invoicing, tax, B2B billing, or payment verification is needed
  - field: shipping_address
    required_when:
    - physical goods, delivery, fulfillment, or returns are in scope
  - field: country
    required_when:
    - cross-border sales, tax, shipping zones, compliance, or regional reporting is needed
  - field: acquisition_channel
    required_when:
    - marketing attribution, CAC, cohort, or channel ROI analysis is enabled
  recommended_fields:
  - customer_type
  - customer_status
  - created_at
  optional_fields:
  - customer_name
  - phone
  - lifetime_value
- entity: PRODUCT
  available_fields:
  - product_id
  - variant_id
  - sku
  - product_name
  - product_type
  - category
  - brand
  - supplier_id
  - unit_price
  - unit_cost
  - product_status
  field_presence_rule:
    severity: critical
    check: For PRODUCT, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: PRODUCT_001
    name: sku_uniqueness
    severity: high
    check: sku should be unique at variant level when sku exists.
  - id: PRODUCT_002
    name: unit_price_non_negative
    severity: high
    check: unit_price must be >= 0.
  - id: PRODUCT_003
    name: unit_cost_non_negative
    severity: high
    check: unit_cost must be >= 0 when present.
  - id: PRODUCT_004
    name: status_allowed_values
    severity: medium
    check: product_status should map to active, draft, archived, discontinued, backorder, preorder, hidden, or unknown.
  universal_required_fields:
  - product_id
  conditional_required_fields:
  - field: variant_id
    required_when:
    - SKU/variant-level catalog, size/color options, WMS, or variant-level inventory is used
  - field: sku
    required_when:
    - physical goods, warehouse operations, barcode scanning, marketplace listing, or fulfillment is used
  - field: supplier_id
    required_when:
    - procurement, dropshipping, supplier performance, purchase orders, or landed-cost analytics is needed
  - field: unit_price
    required_when:
    - pricing, revenue, quote, or order-line reconstruction is needed
  - field: unit_cost
    required_when:
    - gross margin, contribution margin, replenishment economics, or bundle margin is needed
  - field: product_status
    required_when:
    - catalog lifecycle, active/inactive listing control, or product availability reporting is needed
  recommended_fields:
  - product_name
  - product_type
  - category
  optional_fields:
  - brand
- entity: TRANSACTION
  available_fields:
  - transaction_id
  - order_id
  - invoice_id
  - customer_id
  - transaction_type
  - transaction_status
  - order_date
  - sales_channel
  - currency
  - subtotal_amount
  - discount_amount
  - tax_amount
  - shipping_amount
  - total_amount
  field_presence_rule:
    severity: critical
    check: For TRANSACTION, enforce universal_required_fields always; enforce conditional_required_fields only when their
      required_when condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: TRANSACTION_001
    name: total_amount_formula
    severity: high
    check: total_amount should approximately equal subtotal_amount - discount_amount + tax_amount + shipping_amount.
  - id: TRANSACTION_002
    name: money_non_negative
    severity: high
    check: subtotal_amount, tax_amount, shipping_amount, and total_amount should be >= 0 except credit notes/refunds.
  - id: TRANSACTION_003
    name: order_date_not_future
    severity: medium
    check: order_date should not be in the future beyond allowed clock skew.
  - id: TRANSACTION_004
    name: status_allowed_values
    severity: medium
    check: transaction_status should map to pending, paid, fulfilled, cancelled, refunded, partially_refunded, voided, failed,
      or unknown.
  universal_required_fields:
  - transaction_id
  conditional_required_fields:
  - field: order_id
    required_when:
    - order lifecycle, fulfillment, returns, order lines, or marketplace order reconciliation is needed
  - field: invoice_id
    required_when:
    - B2B invoicing, accounting sync, ERP, QuickBooks/Xero/SAP, or accounts receivable is used
  - field: customer_id
    required_when:
    - customer analytics, retention, churn, LTV, personalization, or support linkage is needed
  - field: order_date
    required_when:
    - time-series revenue, cohort, seasonality, or operational reporting is needed
  - field: sales_channel
    required_when:
    - omnichannel, marketplace, POS, social commerce, or store/channel reporting is needed
  - field: currency
    required_when:
    - multi-currency, cross-border, marketplace payout, or accounting reconciliation is used
  - field: subtotal_amount
    required_when:
    - gross/net revenue split or discount/tax/shipping reconciliation is needed
  - field: discount_amount
    required_when:
    - promotion, coupon, margin leakage, or campaign ROI analysis is needed
  - field: tax_amount
    required_when:
    - tax reporting, VAT/GST/sales tax, or invoice reconciliation is needed
  - field: total_amount
    required_when:
    - revenue, AOV, payment reconciliation, or financial reporting is needed
  recommended_fields:
  - transaction_type
  - transaction_status
  optional_fields:
  - shipping_amount
- entity: ORDER_LINE
  available_fields:
  - order_line_id
  - order_id
  - product_id
  - variant_id
  - quantity
  - unit_price
  - line_total_amount
  field_presence_rule:
    severity: critical
    check: For ORDER_LINE, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: ORDER_LINE_001
    name: quantity_valid
    severity: high
    check: quantity should be > 0 for sales lines and < 0 only for credit/reversal lines by policy.
  - id: ORDER_LINE_002
    name: line_total_formula
    severity: high
    check: line_total_amount should approximately equal quantity * unit_price minus line discount plus tax if tax-inclusive
      policy applies.
  - id: ORDER_LINE_003
    name: line_parent_exists
    severity: critical
    check: order_id must exist in TRANSACTION for sales analytics.
  universal_required_fields:
  - order_line_id
  conditional_required_fields:
  - field: order_id
    required_when:
    - order header/detail joins, basket analysis, returns, fulfillment, or invoice reconstruction is needed
  - field: product_id
    required_when:
    - product performance, merchandising, recommendation, inventory, or margin analysis is needed
  - field: variant_id
    required_when:
    - variant/SKU-level sales, size/color analysis, WMS, or item-level returns are used
  - field: quantity
    required_when:
    - unit economics, basket size, inventory deduction, or product quantity analysis is needed
  - field: unit_price
    required_when:
    - line revenue reconstruction, price variance, discount analysis, or quotes are needed
  - field: line_total_amount
    required_when:
    - revenue, margin, basket, AOV, or product sales reporting is needed
  recommended_fields: []
  optional_fields: []
- entity: INVENTORY
  available_fields:
  - inventory_record_id
  - product_id
  - variant_id
  - location_id
  - quantity_on_hand
  - quantity_available
  field_presence_rule:
    severity: critical
    check: For INVENTORY, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: INVENTORY_001
    name: inventory_non_negative
    severity: medium
    check: quantity_on_hand and quantity_available should be >= 0 unless backorder/negative inventory is allowed.
  - id: INVENTORY_002
    name: available_not_greater_than_on_hand
    severity: medium
    check: quantity_available should be <= quantity_on_hand unless virtual/infinite inventory is used.
  - id: INVENTORY_003
    name: location_required_for_multisite
    severity: high
    check: location_id is required when the business uses multiple warehouses, stores, 3PLs, or dropship nodes.
  universal_required_fields:
  - inventory_record_id
  conditional_required_fields:
  - field: product_id
    required_when:
    - physical goods, stock tracking, replenishment, availability, or merchandising is used
  - field: variant_id
    required_when:
    - SKU/variant-level inventory or WMS is used
  - field: location_id
    required_when:
    - multi-location, warehouse, store, 3PL, or stock allocation is used
  - field: quantity_on_hand
    required_when:
    - stock valuation, shrinkage, inventory planning, or warehouse count is needed
  - field: quantity_available
    required_when:
    - sellable availability, safety stock, backorder, or stockout prevention is needed
  recommended_fields: []
  optional_fields: []
- entity: SUBSCRIPTION
  available_fields:
  - subscription_id
  - customer_id
  - product_id
  - subscription_status
  - plan_name
  - billing_interval
  - current_period_start
  - current_period_end
  field_presence_rule:
    severity: critical
    check: For SUBSCRIPTION, enforce universal_required_fields always; enforce conditional_required_fields only when their
      required_when condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: SUBSCRIPTION_001
    name: period_order
    severity: high
    check: current_period_start must be before current_period_end.
  - id: SUBSCRIPTION_002
    name: billing_interval_allowed_values
    severity: medium
    check: billing_interval should map to daily, weekly, monthly, quarterly, annual, prepaid, trial, or custom.
  - id: SUBSCRIPTION_003
    name: active_subscription_has_customer
    severity: critical
    check: Active subscriptions must have a customer_id.
  universal_required_fields:
  - subscription_id
  conditional_required_fields:
  - field: customer_id
    required_when:
    - subscriber retention, churn, LTV, invoicing, or customer support is needed
  - field: product_id
    required_when:
    - plan is represented as a product, SKU, membership, or replenishment item
  - field: subscription_status
    required_when:
    - active/cancelled/paused/trial lifecycle reporting is needed
  - field: plan_name
    required_when:
    - human-readable plan analysis or plan migration reporting is needed
  - field: billing_interval
    required_when:
    - MRR/ARR, renewal, dunning, or billing forecast is needed
  - field: current_period_start
    required_when:
    - period revenue recognition, renewals, or churn window logic is needed
  - field: current_period_end
    required_when:
    - renewal prediction, churn, entitlement expiry, or dunning is needed
  recommended_fields: []
  optional_fields: []
- entity: RETURN
  available_fields:
  - return_id
  - order_id
  - order_line_id
  - return_status
  - return_reason
  - refund_amount
  field_presence_rule:
    severity: critical
    check: For RETURN, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: RETURN_001
    name: refund_non_negative
    severity: high
    check: refund_amount should be >= 0.
  - id: RETURN_002
    name: refund_not_exceed_order
    severity: high
    check: refund_amount should not exceed related order/line amount unless it includes goodwill, shipping, or fee refund.
  - id: RETURN_003
    name: return_status_allowed_values
    severity: medium
    check: return_status should map to requested, approved, received, inspected, refunded, exchanged, rejected, chargeback,
      or unknown.
  universal_required_fields:
  - return_id
  conditional_required_fields:
  - field: order_id
    required_when:
    - returns must reconcile to orders or customer purchase history
  - field: order_line_id
    required_when:
    - item-level return rate, reason analysis, or refund allocation is needed
  - field: return_status
    required_when:
    - RMA workflow, approval, received, refunded, or exchange status is tracked
  - field: refund_amount
    required_when:
    - refund reconciliation, net revenue, or return cost analysis is needed
  recommended_fields: []
  optional_fields:
  - return_reason
- entity: MARKETING
  available_fields:
  - campaign_id
  - coupon_code
  - promotion_type
  - discount_value
  - campaign_channel
  - attribution_source
  field_presence_rule:
    severity: critical
    check: For MARKETING, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: MARKETING_001
    name: discount_value_non_negative
    severity: medium
    check: discount_value should be >= 0.
  - id: MARKETING_002
    name: coupon_code_normalization
    severity: low
    check: coupon_code should be trimmed and case-normalized for campaign attribution.
  - id: MARKETING_003
    name: channel_allowed_values
    severity: low
    check: campaign_channel should map to paid_search, paid_social, email, sms, affiliate, referral, organic, marketplace,
      direct, or unknown.
  universal_required_fields:
  - campaign_id
  conditional_required_fields:
  - field: coupon_code
    required_when:
    - coupon/voucher campaign, discount redemption, or promo code tracking is used
  - field: promotion_type
    required_when:
    - promotion classification, discount strategy, or offer comparison is needed
  - field: discount_value
    required_when:
    - campaign cost, margin leakage, or offer economics is needed
  - field: campaign_channel
    required_when:
    - channel ROI, UTM, ads, email, SMS, influencer, or affiliate reporting is needed
  - field: attribution_source
    required_when:
    - source/medium/campaign attribution or CAC analysis is needed
  recommended_fields: []
  optional_fields: []
- entity: FULFILLMENT
  available_fields:
  - fulfillment_id
  - order_id
  - warehouse_id
  - carrier_name
  - tracking_number
  - fulfillment_status
  - delivered_at
  field_presence_rule:
    severity: critical
    check: For FULFILLMENT, enforce universal_required_fields always; enforce conditional_required_fields only when their
      required_when condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: FULFILLMENT_001
    name: delivered_after_order
    severity: medium
    check: delivered_at should be after related order_date when available.
  - id: FULFILLMENT_002
    name: tracking_required_for_shipped
    severity: medium
    check: tracking_number should be present for shipped status unless local pickup/digital delivery applies.
  - id: FULFILLMENT_003
    name: fulfillment_status_allowed_values
    severity: medium
    check: fulfillment_status should map to pending, picking, packed, shipped, delivered, failed, returned, cancelled, or
      unknown.
  universal_required_fields:
  - fulfillment_id
  conditional_required_fields:
  - field: order_id
    required_when:
    - physical fulfillment must connect to order header or order lines
  - field: warehouse_id
    required_when:
    - warehouse, 3PL, store pickup, or multi-location fulfillment is used
  - field: carrier_name
    required_when:
    - shipping carrier performance, delivery SLA, or parcel tracking is needed
  - field: tracking_number
    required_when:
    - parcel-level shipment tracking, WISMO, or customer notification is needed
  - field: fulfillment_status
    required_when:
    - pick/pack/ship/deliver/cancel workflow or SLA reporting is needed
  - field: delivered_at
    required_when:
    - delivery SLA, late delivery, or customer experience analysis is needed
  recommended_fields: []
  optional_fields: []
- entity: REVIEW
  available_fields:
  - review_id
  - customer_id
  - subject_type
  - subject_id
  - rating_score
  - review_text
  - sentiment_score
  field_presence_rule:
    severity: critical
    check: For REVIEW, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: REVIEW_001
    name: rating_range
    severity: high
    check: rating_score should be in the accepted business scale, usually 1 to 5 or 0 to 10.
  - id: REVIEW_002
    name: sentiment_range
    severity: medium
    check: sentiment_score should be between -1 and 1 when normalized.
  - id: REVIEW_003
    name: review_subject_required
    severity: medium
    check: subject_type and subject_id should identify product, seller, order, delivery, support, app, or service.
  universal_required_fields:
  - review_id
  conditional_required_fields:
  - field: customer_id
    required_when:
    - verified buyer reviews, customer satisfaction, NPS, or support linkage is needed
  - field: subject_id
    required_when:
    - review must link to product, seller, order, support ticket, or store
  - field: subject_type
    required_when:
    - reviews can target multiple subject types such as product, seller, store, delivery, support
  - field: rating_score
    required_when:
    - star rating, NPS, CSAT, review scoring, or sentiment benchmarking is needed
  recommended_fields: []
  optional_fields:
  - review_text
  - sentiment_score
- entity: MARKETPLACE_SELLER
  available_fields:
  - seller_id
  - seller_name
  - seller_status
  - commission_rate
  field_presence_rule:
    severity: critical
    check: For MARKETPLACE_SELLER, enforce universal_required_fields always; enforce conditional_required_fields only when
      their required_when condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: MARKETPLACE_SELLER_001
    name: commission_rate_range
    severity: high
    check: commission_rate should be between 0 and 1 when stored as ratio, or 0 and 100 when stored as percentage.
  - id: MARKETPLACE_SELLER_002
    name: seller_status_allowed_values
    severity: medium
    check: seller_status should map to onboarding, active, suspended, inactive, terminated, or unknown.
  universal_required_fields:
  - seller_id
  conditional_required_fields:
  - field: seller_name
    required_when:
    - seller reporting, vendor portal, or marketplace catalog display is needed
  - field: seller_status
    required_when:
    - seller onboarding, suspension, active/inactive marketplace operations are used
  - field: commission_rate
    required_when:
    - commission, platform fee, payout, or seller profitability reporting is needed
  recommended_fields: []
  optional_fields: []
- entity: LOYALTY
  available_fields:
  - loyalty_account_id
  - customer_id
  - points_balance
  - tier_name
  - rewards_value
  field_presence_rule:
    severity: critical
    check: For LOYALTY, enforce universal_required_fields always; enforce conditional_required_fields only when their required_when
      condition is active. Recommended and optional fields must not block ingestion.
    missing_field_actions:
    - generate stable surrogate/composite key for missing universal identifiers when possible
    - ask business-context question for active conditional fields
    - mark not_applicable for inactive conditional fields
    - record data-quality warning for recommended fields but continue mapping
  recommended_checks:
  - id: LOYALTY_001
    name: points_non_negative
    severity: medium
    check: points_balance should be >= 0 unless negative balance is allowed.
  - id: LOYALTY_002
    name: rewards_value_non_negative
    severity: medium
    check: rewards_value should be >= 0.
  - id: LOYALTY_003
    name: customer_join_required
    severity: high
    check: customer_id should exist in CUSTOMER for loyalty segmentation.
  universal_required_fields:
  - loyalty_account_id
  conditional_required_fields:
  - field: customer_id
    required_when:
    - loyalty account is tied to a known customer identity
  - field: points_balance
    required_when:
    - points, miles, cashback, or reward liability is tracked
  - field: tier_name
    required_when:
    - tier benefits, VIP segmentation, or status-based pricing is used
  - field: rewards_value
    required_when:
    - monetary liability, cashback, voucher value, or reward accounting is needed
