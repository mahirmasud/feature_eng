cross_entity_rules:
- id: XENT_001
  name: transaction_customer_join
  severity: critical
  check: TRANSACTION.customer_id should join to CUSTOMER.customer_id when customer-level analytics are required.
  entities:
  - TRANSACTION
  - CUSTOMER
- id: XENT_002
  name: order_line_transaction_join
  severity: critical
  check: ORDER_LINE.order_id should join to TRANSACTION.order_id for order detail analysis.
  entities:
  - ORDER_LINE
  - TRANSACTION
- id: XENT_003
  name: order_line_product_join
  severity: critical
  check: ORDER_LINE.product_id should join to PRODUCT.product_id for product performance analytics.
  entities:
  - ORDER_LINE
  - PRODUCT
- id: XENT_004
  name: payment_transaction_reconciliation
  severity: high
  check: Successful PAYMENT.payment_amount should reconcile to TRANSACTION.total_amount after refunds, captures, fees, and
    settlement timing.
  entities:
  - PAYMENT
  - TRANSACTION
  - RETURN
- id: XENT_005
  name: inventory_product_join
  severity: high
  check: INVENTORY.product_id and variant_id should map to PRODUCT product/variant identifiers.
  entities:
  - INVENTORY
  - PRODUCT
- id: XENT_006
  name: return_order_line_consistency
  severity: high
  check: RETURN.order_line_id should exist in ORDER_LINE and refund_amount should not exceed related line total unless manually
    approved.
  entities:
  - RETURN
  - ORDER_LINE
- id: CROSS_007
  name: channel_transaction_link
  severity: high
  check: TRANSACTION.sales_channel should map to STORE_CHANNEL.channel_id or STORE_CHANNEL.channel_type when channel reporting
    is required.
- id: CROSS_008
  name: address_order_customer_link
  severity: high
  check: ADDRESS_LOCATION rows linked to orders/customers should reconcile with CUSTOMER billing/shipping addresses and fulfillment
    destinations.
- id: CROSS_009
  name: checkout_to_transaction_conversion
  severity: medium
  check: Completed CART_CHECKOUT records should have a matching TRANSACTION when the source captures both pre-purchase and
    order data.
- id: CROSS_010
  name: quote_to_order_conversion
  severity: medium
  check: Accepted QUOTE_DRAFT_ORDER records should link to a TRANSACTION or invoice/order identifier.
- id: CROSS_011
  name: tax_amount_reconciliation
  severity: critical
  check: SUM(TAX.tax_amount) by order_id should reconcile to TRANSACTION.tax_amount within configured rounding tolerance.
- id: CROSS_012
  name: promotion_discount_reconciliation
  severity: high
  check: PROMOTION_REDEMPTION.discount_amount should reconcile to TRANSACTION.discount_amount or ORDER_LINE discount allocation.
- id: CROSS_013
  name: gift_card_liability_reconciliation
  severity: high
  check: Gift card/store credit issued, redeemed, expired, and current balance should reconcile to payment and refund records.
- id: CROSS_014
  name: stock_movement_inventory_reconciliation
  severity: critical
  check: WAREHOUSE_STOCK_MOVEMENT quantity_after should reconcile to INVENTORY.quantity_on_hand for the same product/location.
- id: CROSS_015
  name: purchase_order_receiving_reconciliation
  severity: high
  check: PURCHASE_ORDER received quantities should reconcile to inbound stock movements and inventory increases.
- id: CROSS_016
  name: seller_payout_reconciliation
  severity: critical
  check: PAYOUT_PLATFORM_FEE payout, fee, and commission values should reconcile to seller transactions and payment settlements.
- id: CROSS_017
  name: dispute_payment_reconciliation
  severity: critical
  check: DISPUTE_CHARGEBACK disputed_amount and outcomes should reconcile to PAYMENT, RETURN, and accounting adjustments.
- id: CROSS_018
  name: support_customer_order_link
  severity: medium
  check: SUPPORT_TICKET should link to CUSTOMER and TRANSACTION when the issue is customer/order related.
- id: CROSS_019
  name: consent_marketing_suppression
  severity: critical
  check: Marketing exports must respect CONSENT_MARKETING_OPT_IN opt-in/opt-out and revoked consent timestamps.
- id: CROSS_020
  name: bundle_component_inventory_explosion
  severity: high
  check: BUNDLE_COMPONENT quantity_required should be used to explode bundle sales into component inventory and component
    cost.
