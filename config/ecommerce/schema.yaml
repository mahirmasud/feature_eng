schema_name: universal_ecommerce_schema
version: 2.2.0-business-conditional-requirements
purpose: Canonical ecommerce data model used for entity recognition, field recognition, analytics, and recommendation engines.
  Includes business-type-aware field requirement policies so fields are not treated as globally required.
layer: 'Layer 1: Universal E-commerce Schema'
design_principles:
- 'Canonical but source-system tolerant: maps Shopify, Stripe, QuickBooks, SAP-style ERP, analytics, and custom e-commerce
  schemas into one semantic layer.'
- 'Business-type aware: every entity declares which e-commerce business models normally use it.'
- 'Niche-case aware: supports physical, digital, SaaS, subscription boxes, memberships, rental/bookings, marketplaces, B2B
  pricing, dropshipping, loyalty, and clickstream analytics.'
- 'Recognition-first: entity/table detection and field/column detection metadata are built into the schema so it can power
  automated mapping.'
- 'Advanced operational coverage: includes channels, addresses, carts, quotes, tax, promotion redemption, gift/store credit,
  stock movements, purchase orders, payouts/fees, disputes, support, consent, and bundle components.'
business_types_supported:
- DTC retail
- omnichannel retail
- B2B wholesale
- marketplace
- SaaS subscription
- subscription box
- membership
- digital goods
- rental/bookings
- dropshipping
- replenishment commerce
- loyalty-led commerce
- services commerce
- multi-vendor commerce
- social commerce
- POS retail
- cross-border commerce
- global commerce
- creator commerce
- custom bundles
- 3PL commerce
- high-ticket retail
- assisted sales
- custom manufacturing
- payment-led commerce
counts:
  entities: 30
  core_fields_total: 251
  derived_metrics: 21
  requirement_levels:
    universal_required: 33
    conditional_required: 191
    recommended: 9
    optional: 18
  requirement_model_version: business_conditional_v1
entities:
- entity: CUSTOMER
  purpose: Customer, buyer, account, subscriber, member, or company account.
  row_grain: one row per customer/account identity
