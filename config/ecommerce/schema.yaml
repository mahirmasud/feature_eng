    - accounts
    - buyers
    - members
    - subscribers
    - clients
    - b2b_accounts
    positive_column_signals:
    - customer_id
    - account_id
    - customer_type
    - customer_name
    - email
    - phone
    relationship_hints:
    - Look for primary keys ending in _id or external_id.
    - Look for foreign keys shared with CUSTOMER, PRODUCT, TRANSACTION, ORDER_LINE, PAYMENT, and FULFILLMENT.
    - Use amount/status/date clusters to separate header tables from detail/event tables.
    common_false_positives: []
  fields:
  - name: customer_id
    data_type: string
    semantic_role: identifier
    description: Customer primary identifier.
    nullable: false
    sensitivity: standard
    source_system_hints:
    - Shopify Customer
    - Stripe Customer
    - QuickBooks Customer
    requirement_level: universal_required
    required_when:
    - always required for this canonical entity row grain
    missing_strategy: generate a stable surrogate/composite key if the source lacks a single ID
