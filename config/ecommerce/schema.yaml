recognition_hints:
  entity_recognition:
    strategy: Score each source table against every canonical entity using table name patterns, positive column signals, primary/foreign
      key structure, amount/date/status clusters, and relationship hints.
    recommended_entity_score_features:
    - table_name_similarity
    - column_name_keyword_overlap
    - primary_key_pattern
    - foreign_key_links
    - amount_field_presence
    - timestamp_field_presence
    - status_enum_presence
    - row_grain_inference
    - sample_value_regex
    - cardinality_profile
    - relationship_graph_context
    confidence_thresholds:
      high_confidence: 0.82
      medium_confidence: 0.62
      needs_human_review: 0.45
  field_recognition:
    strategy: Map source columns to canonical fields using exact aliases, normalized aliases, fuzzy matching, data type checks,
      sample value patterns, entity context, and known source-system vocabulary.
    recommended_field_score_features:
    - exact_alias_match
    - normalized_alias_match
    - token_similarity
    - abbreviation_match
    - data_type_match
    - sample_value_pattern
    - entity_context_match
    - unit_or_currency_context
    - null_rate_and_cardinality
    - nearby_column_context
    use_keyword_file: ecommerce_keywords.json
requirement_model:
  principle: No canonical field is enforced globally unless it is needed to identify the row grain. All other requirements
    depend on business model, product type, channel, fulfillment model, analytics goal, or regulatory context.
  requirement_levels:
    universal_required: Needed for the canonical entity row grain. If missing, generate a stable surrogate/composite key before
      production use.
    conditional_required: Required only when the matching business context, use case, metric, workflow, or compliance need
      is enabled.
    recommended: Strongly useful for analytics quality, matching, segmentation, and explainability, but not mandatory for
      every business.
    optional: Useful enrichment field. Do not block ingestion or mapping when missing.
  business_context_inputs:
  - business_type
  - product_type
  - sales_channel_model
  - marketplace_model
  - subscription_model
  - fulfillment_model
  - inventory_model
  - payment_model
  - tax_region_model
  - marketing_model
  - support_model
  - analytics_goals
  blocking_policy:
    block_when_missing:
    - universal_required fields with no reliable source key or surrogate key strategy
    - conditional_required fields when the matching condition is active and the downstream workflow/metric depends on it
    do_not_block_when_missing:
    - conditional_required fields where the condition is not active
    - recommended fields
    - optional fields
  missing_field_resolution_order:
  - look_for_exact_or_synonym_match_in_keywords_yaml
  - look_for foreign key or relationship-based equivalent
  - derive from source fields if deterministic
  - generate stable surrogate key for identifier-only gaps
  - ask business clarifying question if the field affects an enabled metric/workflow
  - mark not_applicable when the business context proves the field is irrelevant
