# ============================================================
# AutoFE Pipeline Configuration
# ============================================================

pipeline:
  name: "AutoFE Pipeline"
  version: "1.0.0"
  random_seed: 42
  verbose: true
  log_level: "INFO"

# ─── Data Ingestion ──────────────────────────────────────────
ingestion:
  chunk_size: 50000           # rows per chunk for large files
  max_sample_rows: 500000     # cap for in-memory profiling
  encoding_fallbacks:         # tried in order
    - utf-8
    - latin-1
    - cp1252
  csv_sep: null               # null = auto-detect
  excel_sheet: 0              # sheet index or name
  json_orient: null           # null = auto-detect
  infer_datetime: true
  low_memory: false

# ─── Column Type Detection ───────────────────────────────────
type_detection:
  id_max_cardinality_ratio: 0.95   # col is ID if unique% > this
  cat_max_cardinality: 50          # max unique values for cat
  text_avg_token_threshold: 5      # avg tokens to call it text
  bool_values:
    - [true, false]
    - [0, 1]
    - ["yes", "no"]
    - ["y", "n"]
  datetime_patterns:
    - "%Y-%m-%d"
    - "%d/%m/%Y"
    - "%m/%d/%Y"
    - "%Y-%m-%dT%H:%M:%S"
    - "%Y-%m-%d %H:%M:%S"

# ─── Data Quality & Cleaning ─────────────────────────────────
cleaning:
  drop_missing_threshold: 0.7      # drop col if missing% > 70%
  numeric_impute_strategy: "median"
  cat_impute_strategy: "most_frequent"
  text_impute_value: ""
  outlier_method: "iqr"            # iqr | zscore | none
  outlier_clip_factor: 3.0
  drop_duplicates: true
  remove_constant_cols: true
  whitespace_strip: true

# ─── Feature Engineering ─────────────────────────────────────
engineering:
  max_depth: 2                     # DFS depth
  max_features: 500                # hard cap on generated features
  include_primitives:
    aggregation:
      - COUNT
      - SUM
      - MEAN
      - STD
      - MIN
      - MAX
      - MEDIAN
      - NUM_UNIQUE
      - PERCENT_TRUE
      - SKEW
    transform:
      - ADD_NUMERIC
      - DIVIDE_NUMERIC
      - SUBTRACT_NUMERIC
      - MULTIPLY_NUMERIC
      - PERCENTILE
      - ABSOLUTE
      - LOG
      - SQUARE
      - SQRT
      - YEAR
      - MONTH
      - DAY
      - WEEKDAY
      - HOUR
      - MINUTE
      - IS_WEEKEND
  datetime_index: null             # auto-detect if null
  ignore_columns: []
  add_statistical_features: true
  add_frequency_encoding: true
  add_cyclical_encoding: true      # sin/cos for periodic features
  add_interaction_features: false  # expensive; off by default
  add_polynomial_features: false
  polynomial_degree: 2
  add_text_features: true
  tfidf_max_features: 50

# ─── Feature Selection ───────────────────────────────────────
selection:
  enabled: true
  variance_threshold: 0.01
  correlation_threshold: 0.95     # drop if corr > this
  mutual_info_top_k: 300          # keep top-k by MI
  drop_leaky_id_cols: true
  remove_duplicates: true

# ─── Output ──────────────────────────────────────────────────
output:
  base_dir: "output"
  formats:
    - parquet
    - csv
  save_cleaned: true
  save_feature_matrix: true
  save_feature_definitions: true
  save_metadata: true
  save_profiling_report: true
  save_selected_features: true
  compress_parquet: true

# ─── Performance ─────────────────────────────────────────────
performance:
  n_jobs: -1                       # -1 = all cores
  use_dask: false                  # enable for very large data
  dask_npartitions: 8
  cache_entityset: true
